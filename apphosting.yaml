    value: "1:719794505288:web:8f4da0edb8335483b27a7d"
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDCLLr_g6MBdQbJvQ-puM8bXbI0L4icF3Q"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: letreview--letreview.asia-southeast1.hosted.app
